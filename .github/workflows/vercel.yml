name: Deploy to Vercel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18
      
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      
      - name: Pull Vercel Environment Info
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }} --orgId=team_y4TFTdeAx59yiwcReGIbJcbJ --project=test-gym-123
      
      - name: Build Project
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }} --orgId=team_y4TFTdeAx59yiwcReGIbJcbJ --project=test-gym-123
      
      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} --orgId=team_y4TFTdeAx59yiwcReGIbJcbJ --project=test-gym-123